<div class="container">
  <h2>Products</h2>
  <div *ngIf="error" class="error">{{ error }}</div>
  <div style="margin-bottom:16px">
    <a routerLink="/products/add">
      <button class="btn-primary">+ Add Product</button>
    </a>
  </div>
  <div *ngIf="products.length === 0" style="color:#888">No products yet.</div>
  <table *ngIf="products.length > 0">
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Price</th>
      <th>Description</th>
      <th>Actions</th>
    </tr>
    <tr *ngFor="let p of products">
      <td>{{ p.id }}</td>
      <td>{{ p.name }}</td>
      <td>{{ p.price }}</td>
      <td>{{ p.description }}</td>
      <td style="display:flex;gap:8px">
        <a [routerLink]="['/products/edit', p.id]">
          <button class="btn-secondary">Edit</button>
        </a>
        <button class="btn-danger" (click)="delete(p.id)">Delete</button>
      </td>
    </tr>
  </table>
</div>
